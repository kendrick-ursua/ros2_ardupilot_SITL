version: '3'

services:
  ardupilot_ros:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - USERNAME=ros
        - USER_UID=1000
        - USER_GID=1000
    image: ros2_ardupilot_sitl-ardupilot_ros:latest
    container_name: ardupilot_sitl
    user: ros
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - GZ_VERSION=harmonic
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ~/.Xauthority:/home/ros/.Xauthority
      - ./src:/tmp/local_src  # Mount your local src to a temporary directory
    devices:
      - /dev/dri:/dev/dri  
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true
    working_dir: /home/ros/ros2_ws/src
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    command: bash
    
